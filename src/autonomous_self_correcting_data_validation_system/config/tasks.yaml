---
intake_and_normalize_raw_input:
  description: |-
    Accept the following raw unstructured input and normalize it:

    RAW INPUT:
    {raw_input}

    Your tasks:
    1. Strip all noise characters, extra whitespace, and formatting artifacts
    2. Detect the document/form type (hospital form, bank KYC, insurance claim, HR resume, e-commerce registration, general form)
    3. Identify all field-value pairs present in the input, even if poorly formatted
    4. Tag each field as PRESENT or MISSING
    5. Detect the language and character encoding
    6. Produce a clean normalized field map

    Do NOT modify field values — only clean and organize them.
  expected_output: |-
    A structured JSON object with:
    - "document_type": detected form/document type string
    - "language": detected language code (e.g. "en")
    - "raw_fields": a dictionary of all detected field names mapped to their raw values (use null for missing/empty fields)
    - "field_status": a dictionary marking each field as "PRESENT" or "MISSING"
    - "normalization_notes": any observations about the input quality or unusual patterns detected
  agent: input_intake_preprocessing_specialist
extract_and_type_structured_fields:
  description: |-
    Using the normalized field map from the intake stage, extract all fields with their correct data types and assign confidence scores.

    Perform the following:
    1. Map informal field names to standard schema names (e.g. "DOB" → "date_of_birth", "Ph" → "phone")
    2. Convert informal value representations to typed values:
       - Text numbers → integers ("twenty five" → 25)
       - Date strings → ISO 8601 format ("1st Jan 1990" → "1990-01-01")
       - Mixed case names → preserve as-is (do not correct yet)
    3. Assign a confidence score (0.0–1.0) to each field based on extraction certainty
    4. For any field that cannot be reliably extracted, return null and provide a clear reason
    5. NEVER fabricate, guess, or invent values for missing fields — null + reason only
  expected_output: |-
    A structured JSON object with:
    - "extracted_fields": dictionary of field names mapped to objects containing:
      - "value": the extracted typed value (or null)
      - "original_value": the raw value before type conversion
      - "confidence": float 0.0–1.0
      - "null_reason": string explanation if value is null (else null)
    - "extraction_summary": total fields extracted, total nulls, average confidence score
  agent: structured_field_extraction_specialist
  context:
  - intake_and_normalize_raw_input
retrieve_validation_rules_from_knowledge_base:
  description: |-
    Using the detected document type from the intake stage, query the knowledge base to retrieve all applicable validation rules, JSON schema definitions, and business constraints.

    Query the knowledge base for:
    1. JSON schema for the detected document type (field names, types, required fields)
    2. Field-level validation rules: regex patterns, allowed formats, value ranges
    3. Enum values for categorical fields (e.g. blood groups: A+, A-, B+, B-, O+, O-, AB+, AB-)
    4. Mandatory fields list for this document type
    5. Country-specific format rules (e.g. Indian phone numbers: 10 digits starting with 6-9)
    6. PII field registry (fields that must never be auto-corrected)
    7. Cross-field validation rules (e.g. age must be consistent with date_of_birth)

    If the knowledge base has no specific rules for a field, mark that field as UNVALIDATED — do not assume rules.
  expected_output: |-
    A structured JSON object called ValidationRuleSet containing:
    - "schema": field definitions with types and required flags
    - "field_rules": per-field validation rules (pattern, min, max, enum, length)
    - "mandatory_fields": list of required field names
    - "pii_fields": list of fields classified as PII (never auto-correct)
    - "cross_field_rules": any rules involving multiple fields
    - "unvalidated_fields": fields with no rules found in knowledge base
    - "source_references": which knowledge base documents/chunks were used
  agent: business_rules_schema_rag_retrieval_specialist
  context:
  - intake_and_normalize_raw_input
validate_all_extracted_fields:
  description: |-
    Apply the complete ValidationRuleSet against every extracted field from the extraction stage.

    For each field, perform ALL applicable checks:
    1. TYPE CHECK: Is the value the correct data type (string, integer, boolean)?
    2. FORMAT CHECK: Does it match the required regex pattern (email, phone, date)?
    3. RANGE CHECK: Is a numeric value within the allowed min/max range?
    4. ENUM CHECK: Is a categorical value in the allowed enum list?
    5. LENGTH CHECK: Does the value meet minimum/maximum length requirements?
    6. PRESENCE CHECK: Is a mandatory field present and non-null?
    7. CROSS-FIELD CHECK: Are related fields logically consistent with each other?

    For fields marked UNVALIDATED in the ValidationRuleSet, mark them as UNVALIDATED (not PASS or FAIL).
    Every single extracted field must have a result entry — no field may be skipped.
  expected_output: |-
    A structured JSON object with:
    - "validation_results": per-field objects containing:
      - "status": "PASS", "FAIL", or "UNVALIDATED"
      - "error_code": specific error identifier if FAIL (e.g. "INVALID_FORMAT", "INSUFFICIENT_LENGTH", "INVALID_ENUM", "MISSING_MANDATORY", "TYPE_MISMATCH")
      - "error_detail": human-readable description of the specific violation
      - "failed_rule": which rule was violated
    - "summary": total PASS count, FAIL count, UNVALIDATED count
    - "overall_status": "PASS" if all mandatory fields pass, else "FAIL"
    - "critical_failures": list of mandatory fields that failed validation
  agent: data_integrity_validation_specialist
  context:
  - extract_and_type_structured_fields
  - retrieve_validation_rules_from_knowledge_base
classify_validation_errors_by_correction_tier:
  description: |-
    Review every FAIL result from the validation stage and classify each error into the appropriate correction tier.

    Classification rules:
    - SAFE_AUTO: Apply only for deterministic, zero-risk, lossless transformations:
      * Name capitalization/title case
      * Leading/trailing whitespace removal
      * Obvious email TLD completion (john@gmail → john@gmail.com, only if domain is unambiguous)
      * Text-to-number conversion already done in extraction
      * Date format normalization to ISO 8601

    - SUGGESTED: Apply for probable corrections that need logging:
      * Partial address expansion (city only → add state + country)
      * Minor format normalization where one interpretation is highly probable
      * Standardizing known abbreviations

    - HUMAN_REQUIRED: Apply for ALL of the following (non-negotiable):
      * Any field listed as PII in the ValidationRuleSet
      * Phone numbers with missing digits
      * National ID numbers (Aadhaar, PAN, SSN, passport)
      * Account numbers, insurance IDs
      * Medical fields (blood group, diagnoses)
      * Any field where correction requires guessing missing information
      * Any field where the error cannot be resolved with 100% certainty

    Assign risk levels: LOW (cosmetic), MEDIUM (functional), HIGH (identity), CRITICAL (legal/medical/financial)
  expected_output: |-
    A structured JSON object with:
    - "classified_errors": per-field objects for every FAIL containing:
      - "tier": "SAFE_AUTO", "SUGGESTED", or "HUMAN_REQUIRED"
      - "risk_level": "LOW", "MEDIUM", "HIGH", or "CRITICAL"
      - "proposed_action": specific correction action description (or null for HUMAN_REQUIRED)
      - "rationale": why this tier and risk level were assigned
    - "tier_summary": count of errors per tier
    - "pii_fields_blocked": list of PII fields requiring human verification
    - "safe_corrections_available": count of SAFE_AUTO corrections ready to apply
  agent: validation_error_classification_risk_assessment_specialist
  context:
  - validate_all_extracted_fields
  - retrieve_validation_rules_from_knowledge_base
apply_auto_corrections_and_build_correction_log:
  description: |-
    Apply all SAFE_AUTO and SUGGESTED corrections from the classification stage to produce the best-effort corrected data record.

    For each field:
    - SAFE_AUTO fields: Apply the correction immediately (e.g. title-case "john doe" → "John Doe", complete "john@gmail" → "john@gmail.com")
    - SUGGESTED fields: Apply the correction and clearly mark it as SUGGESTED in the log
    - HUMAN_REQUIRED fields: Set value to null. Write a precise null_reason explaining: what was found, why it cannot be corrected, and what information is needed from the human
    - PASS fields: Copy value unchanged

    For EVERY field that changes, create an immutable correction log entry with:
    - field_name, original_value, corrected_value, action_type, confidence, tier

    ABSOLUTE RULE: Never invent digits, never complete partial ID numbers, never guess medical values. If you cannot apply a 100% certain correction, set null + reason.
  expected_output: |-
    A structured JSON object with:
    - "corrected_data": the best-effort corrected record as a clean JSON object with field names mapped to corrected values (null where HUMAN_REQUIRED)
    - "correction_log": list of correction entry objects, one per changed field, each containing:
      - "field": field name
      - "original_value": value before correction
      - "corrected_value": value after correction (or null)
      - "action_type": e.g. "TITLE_CASE", "TLD_COMPLETION", "GEO_EXPANSION", "NULLIFIED_PII", "NULLIFIED_AMBIGUOUS"
      - "tier": "SAFE_AUTO", "SUGGESTED", or "HUMAN_REQUIRED"
      - "confidence": float 0.0–1.0
      - "null_reason": explanation string if nullified (else null)
    - "corrections_applied": count of SAFE_AUTO + SUGGESTED corrections
    - "fields_nullified": count and list of HUMAN_REQUIRED nullified fields
  agent: deterministic_data_auto_correction_specialist
  context:
  - extract_and_type_structured_fields
  - classify_validation_errors_by_correction_tier
compute_field_and_record_confidence_scores:
  description: |-
    Analyze the corrected data and correction log to compute a precise confidence score for every field and an overall record confidence score.

    Scoring rules per field:
    - Start with extraction confidence from the extraction stage
    - SAFE_AUTO correction applied: multiply by 0.98 (minimal reduction)
    - SUGGESTED correction applied: multiply by 0.85 (moderate uncertainty)
    - HUMAN_REQUIRED / null field: score = 0.0 (blocks record approval)
    - PASS (no correction needed): use raw extraction confidence
    - Bonus: if field was cross-validated against another field and both pass, add 0.02

    Overall record score: weighted average of all field scores (mandatory fields weighted 2x)

    Status thresholds:
    - READY_TO_COMMIT: overall score >= 0.85 AND no null mandatory fields
    - NEEDS_REVIEW: overall score between 0.60 and 0.85 OR any null mandatory field
    - BLOCKED: overall score < 0.60 OR any CRITICAL risk null field present

    List all "blocking_fields" — fields that are null, HUMAN_REQUIRED, or score below 0.60.
  expected_output: |-
    A structured JSON object with:
    - "field_scores": dictionary of field names to confidence scores (float 0.0–1.0)
    - "overall_score": weighted average confidence score for the full record (float 0.0–1.0)
    - "record_status": "READY_TO_COMMIT", "NEEDS_REVIEW", or "BLOCKED"
    - "blocking_fields": list of field names preventing READY_TO_COMMIT status (empty list if none)
    - "score_breakdown": explanation of how the overall score was calculated
    - "recommendation": one of "PROCEED_TO_QA", "ESCALATE_TO_HUMAN", "MANUAL_REVIEW_REQUIRED"
  agent: data_quality_confidence_scoring_specialist
  context:
  - apply_auto_corrections_and_build_correction_log
  - extract_and_type_structured_fields
request_human_verification_for_blocked_fields:
  description: |-
    Review the confidence scores and blocked fields. For every field with status HUMAN_REQUIRED or confidence score of 0.0, generate a clear, non-technical verification request.

    For each blocked field, produce a structured prompt that includes:
    1. The field name and what it represents
    2. What value was extracted from the input (even if invalid)
    3. Exactly what the problem is with that value
    4. What a valid value looks like (examples, format, constraints)
    5. A specific question asking the human to provide the correct value

    Present the current best-effort record state showing all successfully corrected fields and their confidence scores alongside the blocked fields.

    Format the output as a professional verification request that could be sent to a data entry operator, a hospital administrator, or a bank officer.

    After presenting the verification request, include a section called HUMAN_RESPONSES where confirmed values can be filled in. For this automated run, use the placeholder "[AWAITING_HUMAN_INPUT]" for each blocked field to clearly indicate these require manual resolution.
  expected_output: |-
    A structured output containing:
    1. "current_record_state": the best-effort corrected data showing all field values and confidence scores
    2. "verification_requests": list of per-field verification request objects, each containing:
       - "field": field name
       - "extracted_value": what was found in the input
       - "problem": clear description of the validation failure
       - "valid_format": description and examples of what a valid value looks like
       - "question": specific question for the human reviewer
    3. "human_responses": dictionary of blocked field names mapped to "[AWAITING_HUMAN_INPUT]"
    4. "warnings": list of warning strings for the final report (e.g. "Phone number incomplete — human verification required")
    5. "escalation_summary": total fields requiring human input, risk levels involved
  agent: human_in_the_loop_verification_escalation_specialist
  context:
  - compute_field_and_record_confidence_scores
  - apply_auto_corrections_and_build_correction_log
final_quality_assurance_and_schema_compliance_check:
  description: |-
    Perform a comprehensive final quality assurance review of the complete corrected record before it is approved for output.

    Execute ALL of the following checks:
    1. SCHEMA COMPLIANCE: Verify every field in the corrected record matches its schema-defined type and format
    2. ANTI-HALLUCINATION CHECK: Cross-reference every non-null value in the corrected data against the original extracted values and correction log — flag any value that cannot be traced to a source
    3. NULL JUSTIFICATION CHECK: Verify every null field has a documented null_reason in the correction log
    4. CORRECTION LOG COMPLETENESS: Verify every modification has a log entry with before/after values
    5. MANDATORY FIELDS CHECK: Verify all mandatory fields are either populated or have documented null reasons
    6. PII INTEGRITY CHECK: Verify no PII field was auto-corrected without HUMAN_REQUIRED classification
    7. FINAL JSON VALIDITY: Verify the corrected_data can be serialized as valid JSON

    If ALL checks pass: issue APPROVED decision.
    If ANY check fails: issue RETRY with a specific list of failed checks and fields.
    Track iteration number — after iteration 3, issue MANUAL_REVIEW_REQUIRED regardless.
  expected_output: |-
    A structured JSON object with:
    - "qa_decision": "APPROVED", "RETRY", or "MANUAL_REVIEW_REQUIRED"
    - "iteration": current iteration number (1, 2, or 3)
    - "checks_performed": list of all checks run with PASS/FAIL status for each
    - "failed_checks": list of failed check names and details (empty if APPROVED)
    - "anti_hallucination_report": list of any values that could not be traced to source (empty if none found)
    - "approved_record": the final schema-compliant JSON record if APPROVED (null if RETRY)
    - "qa_notes": any additional quality observations or recommendations
  agent: final_quality_assurance_schema_compliance_specialist
  context:
  - request_human_verification_for_blocked_fields
  - apply_auto_corrections_and_build_correction_log
  - retrieve_validation_rules_from_knowledge_base
generate_audit_log_and_validation_report:
  description: "Compile the complete pipeline execution into a final audit log and
    human-readable validation report.\n\nProduce two outputs:\n\nOUTPUT 1 — JSON AUDIT
    LOG:\nCompile a structured audit log including:\n- Record ID, timestamp, document
    type\n- Original raw input (verbatim)\n- Per-stage summary: intake, extraction,
    RAG retrieval, validation, classification, correction, scoring, human verification,
    QA\n- Complete correction log (all field changes with before/after)\n- All human
    verification requests and responses\n- Final QA decision and iteration count\n-
    Final approved record\n- Overall confidence score and per-field scores\n\nOUTPUT
    2 — MARKDOWN VALIDATION REPORT:\nWrite a professional, readable report including:\n-
    Executive summary (1 paragraph)\n- Original Input section\n- Corrections Applied
    table (field | original | corrected | action | confidence)\n- ⚠️ WARNINGS section
    listing every null field with explanation\n- \U0001F50D Human Verification Required
    section listing every escalated field\n- ✅ Final Validated Output (formatted JSON)\n-
    \U0001F4CA Confidence Score Summary (overall + per field)\n- \U0001F512 Audit
    Trail Reference\n- Recommended Next Actions"
  expected_output: |-
    Two complete documents:

    1. AUDIT_LOG.json — A fully structured JSON audit log with all pipeline data, timestamps, corrections, decisions, and the final approved record.

    2. VALIDATION_REPORT.md — A professional Markdown report with:
       - Clear executive summary
       - Complete corrections table
       - Warnings section for all null/HUMAN_REQUIRED fields
       - Final validated JSON output
       - Confidence score dashboard
       - Recommended next actions for the human reviewer

    Both documents must be complete, accurate, and reference the same data — no discrepancies between them.
  agent: compliance_audit_trail_validation_report_specialist
  context:
  - final_quality_assurance_and_schema_compliance_check
  - request_human_verification_for_blocked_fields
  - apply_auto_corrections_and_build_correction_log
  - compute_field_and_record_confidence_scores
