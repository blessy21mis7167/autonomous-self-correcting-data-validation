services:
  backend:
    build: .
    container_name: autonomous-backend
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      BACKEND_URL: http://localhost:8000

  frontend:
    build: .
    container_name: autonomous-frontend
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
